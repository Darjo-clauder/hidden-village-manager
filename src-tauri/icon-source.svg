<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#161b28"/>
      <stop offset="60%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#080a11"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3c874"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a88030"/>
    </linearGradient>
    <linearGradient id="leaf" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#79c489"/>
      <stop offset="55%" stop-color="#5aaa68"/>
      <stop offset="100%" stop-color="#3d7d4c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- rounded-square badge -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="none" stroke="url(#gold)" stroke-width="22" stroke-opacity="0.9"/>

  <!-- outer gold ring -->
  <circle cx="512" cy="512" r="330" fill="none" stroke="url(#gold)" stroke-width="16" stroke-opacity="0.55"/>

  <!-- central leaf emblem with a shuriken-notch spiral feel -->
  <g filter="url(#soft)" transform="translate(512 512)">
    <!-- leaf body -->
    <path d="M 0 -300
             C 150 -230 250 -90 250 60
             C 250 200 140 300 0 300
             C -140 300 -250 200 -250 60
             C -250 -90 -150 -230 0 -300 Z"
          fill="url(#leaf)"/>
    <!-- central vein -->
    <path d="M 0 -260 C 40 -120 40 120 0 270"
          fill="none" stroke="#2f6a3d" stroke-width="20" stroke-linecap="round" stroke-opacity="0.8"/>
    <!-- gold spiral swirl over the leaf -->
    <path d="M 0 -150
             C 110 -150 150 -50 90 30
             C 40 95 -60 90 -80 20
             C -95 -35 -50 -70 -10 -55"
          fill="none" stroke="url(#gold)" stroke-width="34" stroke-linecap="round"/>
  </g>
</svg>
